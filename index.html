<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>SGC Logística - Rota diária</title>
    <link rel="icon" type="image/png" href="images.png?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-hidden">
    
    <div id="toast-container" class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 pointer-events-none"></div>
    
    <div id="loading-overlay" class="fixed inset-0 z-[9998] bg-slate-900/95 backdrop-blur-sm hidden flex-col items-center justify-center transition-all duration-300">
        <div class="relative flex justify-center items-center">
            <div class="absolute animate-ping w-24 h-24 rounded-full bg-blue-500 opacity-20"></div>
            <div class="w-20 h-20 border-4 border-slate-700 border-t-blue-500 border-b-blue-500 rounded-full animate-spin shadow-lg"></div>
            <i class="fas fa-truck-fast absolute text-2xl text-blue-500 drop-shadow-[0_0_8px_rgba(59,130,246,0.8)]"></i>
        </div>
    </div>

    <div id="paste-modal" class="hidden fixed inset-0 z-[10005] modal-backdrop flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full overflow-hidden animate-fade-in">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50"><h3 class="font-bold">📋 Prancheta Inteligente</h3><button onclick="UI.toggleModal('paste-modal')"><i class="fas fa-times"></i></button></div>
            <div class="p-6 space-y-4">
                <textarea id="paste-area" rows="8" class="input-modern font-mono text-xs" placeholder="Cole os nomes aqui..."></textarea>
                <button onclick="App.processSmartPaste()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg">Processar Lista</button>
            </div>
        </div>
    </div>

    <div id="app-wrapper" class="flex h-screen w-screen overflow-hidden relative transition-all duration-500 bg-slate-200">
        
        <aside id="sidebar" class="w-full h-full bg-white flex flex-col z-[600] shadow-2xl border-r border-slate-200 transition-colors duration-500">
            <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between shrink-0 z-20">
                <div class="flex items-center gap-3">
                    <img id="app-logo" src="images.png" alt="Logo" class="h-10 w-auto object-contain">
                    <div>
                        <h1 class="font-bold leading-tight">SGC Logística <i class="fas fa-cloud text-blue-500 ml-1 text-[10px]"></i></h1>
                        <span class="text-[9px] bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">Tempo Real</span>
                    </div>
                </div>
                <button onclick="UI.toggleModal('settings-modal')" class="w-8 h-8 rounded-lg text-slate-400 hover:bg-slate-100"><i class="fas fa-cog"></i></button>
            </div>

            <div class="flex-grow overflow-y-auto custom-scroll relative">
                
                <div class="border-b border-slate-100">
                    <button onclick="UI.toggleSection('planning')" class="accordion-header group">
                        <div class="flex items-center gap-3">
                            <div class="accordion-icon"><i class="fas fa-map-location-dot"></i></div>
                            <span class="font-bold text-sm">Operacional</span>
                        </div>
                        <i id="arrow-planning" class="fas fa-chevron-down text-slate-300 text-xs"></i>
                    </button>
                    <div id="section-planning" class="accordion-body hidden">
                        <div class="p-4 space-y-4 max-w-4xl mx-auto">
                            <div class="flex flex-col sm:flex-row gap-2">
                                <div class="bg-slate-100 p-1 rounded-lg flex shadow-inner flex-1">
                                    <button onclick="App.setShift('day')" id="shift-day" class="shift-btn active">🌞 Dia</button>
                                    <button onclick="App.setShift('night')" id="shift-night" class="shift-btn">🌙 Noite</button>
                                </div>
                                <div class="bg-slate-100 p-1 rounded-lg flex shadow-inner items-center px-3 flex-1 sm:flex-none">
                                    <i class="far fa-calendar-alt text-slate-400 mr-2"></i>
                                    <input type="date" id="route-date" class="bg-transparent border-none text-xs font-bold text-slate-700 outline-none w-full cursor-pointer" onchange="App.setRouteDate(this.value)">
                                </div>
                            </div>
                            
                            <div id="drivers-grid" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
                            
                            <div id="editor-panel" class="hidden bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden animate-slide-up">
                                <div class="bg-slate-800 px-4 py-3 text-white flex justify-between items-center">
                                    <div class="flex items-center gap-2 font-bold text-xs uppercase"><i class="fas fa-user-circle"></i> <span id="editor-driver-name">Motorista</span></div>
                                    <button onclick="UI.closeEditor()"><i class="fas fa-times"></i></button>
                                </div>
                                <div class="p-4 space-y-3">
                                    <input id="input-plate" type="text" class="w-full text-center font-mono font-bold uppercase border border-slate-200 rounded-lg p-2" placeholder="PLACA DO CAMINHÃO" maxlength="8" onchange="App.updatePlate()">
                                    <button onclick="UI.toggleModal('paste-modal')" class="w-full py-2 bg-indigo-50 text-indigo-600 border border-indigo-200 rounded-lg text-xs font-bold flex items-center justify-center gap-2"><i class="fas fa-paste"></i> Prancheta (Importar)</button>
                                    
                                    <div class="space-y-2 relative">
                                        <input id="input-empresa" type="text" class="input-modern" placeholder="Empresa" oninput="App.handleAutocomplete(this)">
                                        <input id="input-obra" type="text" class="input-modern" placeholder="Obra" oninput="App.handleAutocomplete(this)">
                                        <div id="suggestions-box" class="hidden absolute left-0 right-0 z-[1001] bg-white border border-slate-200 rounded-lg shadow-xl max-h-48 overflow-y-auto"></div>
                                    </div>

                                    <div class="flex gap-2 items-center">
                                        <input id="input-qty" type="number" value="1" min="1" class="w-16 h-10 text-center font-bold bg-slate-50 border rounded-lg">
                                        <div class="flex-grow grid grid-cols-4 gap-1">
                                            <button onclick="UI.selectType('troca')" id="btn-type-troca" class="type-sel active">T</button>
                                            <button onclick="UI.selectType('colocacao')" id="btn-type-colocacao" class="type-sel">C</button>
                                            <button onclick="UI.selectType('retirada')" id="btn-type-retirada" class="type-sel">R</button>
                                            <button onclick="UI.selectType('encher')" id="btn-type-encher" class="type-sel">E</button>
                                        </div>
                                    </div>

                                    <input id="input-dest" type="text" class="input-modern" placeholder="Endereço...">
                                    <input id="input-obs" type="text" class="input-modern" placeholder="Observação">
                                    
                                    <div class="flex gap-2">
                                        <button onclick="App.addToQueue()" class="flex-1 bg-blue-100 text-blue-700 font-bold py-3 rounded-lg text-sm">Fila</button>
                                        <button onclick="App.addRoute()" class="flex-1 bg-slate-900 text-white font-bold py-3 rounded-lg text-sm">Adicionar</button>
                                    </div>
                                    <div id="mini-history" class="pt-2 border-t border-slate-100 space-y-1"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border-b border-slate-100">
                    <button onclick="UI.toggleSection('list')" class="accordion-header group">
                        <div class="flex items-center gap-3">
                            <div class="accordion-icon"><i class="fas fa-table"></i></div>
                            <span class="font-bold text-sm">Planilha de Monitoramento</span>
                        </div>
                        <i id="arrow-list" class="fas fa-chevron-down text-slate-300 text-xs"></i>
                    </button>
                    <div id="section-list" class="accordion-body hidden">
                        <div class="p-6">
                            <button onclick="UI.toggleModal('spreadsheet-modal')" class="w-full py-5 bg-green-600 text-white font-black rounded-xl shadow-lg">ABRIR PLANILHA GERAL</button>
                        </div>
                    </div>
                </div>

                <div class="border-b border-slate-100">
                    <button onclick="UI.toggleSection('db')" class="accordion-header group">
                        <div class="flex items-center gap-3">
                            <div class="accordion-icon"><i class="fas fa-database"></i></div>
                            <span class="font-bold text-sm">Banco de Endereços</span>
                        </div>
                        <i id="arrow-db" class="fas fa-chevron-down text-slate-300 text-xs"></i>
                    </button>
                    <div id="section-db" class="accordion-body hidden">
                        <div class="p-4 space-y-2">
                            <input id="db-company" type="text" class="input-modern" placeholder="Empresa">
                            <input id="db-name" type="text" class="input-modern" placeholder="Obra">
                            <input id="db-addr" type="text" class="input-modern" placeholder="Endereço">
                            <button onclick="App.addToAddressBook()" class="w-full bg-cyan-600 text-white font-bold py-2 rounded-lg text-xs">Salvar</button>
                            <div id="db-list" class="pt-2 space-y-1 max-h-40 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>

            </div>
        </aside>
    </div>

    <div id="spreadsheet-modal" class="hidden fixed inset-0 z-[10005] bg-slate-100 flex flex-col">
        <div class="bg-white px-4 py-3 flex justify-between items-center border-b-4 border-green-500">
            <h2 class="font-black text-xl flex items-center gap-2"><i class="fas fa-table text-green-600"></i> Planilha Tempo Real</h2>
            <button onclick="UI.toggleModal('spreadsheet-modal')" class="bg-red-500 text-white w-9 h-9 rounded-lg"><i class="fas fa-times"></i></button>
        </div>
        <div id="spreadsheet-container" class="flex-1 overflow-auto flex bg-slate-200 p-2 gap-[1px]"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
