<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="images.png">
    <meta name="theme-color" content="#2563eb">
    <title>Motorista - SGC Logística</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 transition-all duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">
                <i class="fas fa-truck-fast"></i>
            </div>
            <h1 class="text-2xl font-black mb-2 text-slate-800">SGC Motorista</h1>
            <p class="text-xs text-slate-500 mb-6 font-semibold uppercase">Identifique-se para ver sua rota</p>
            
            <div class="text-left mb-6">
                <label class="text-xs font-bold text-slate-700 block mb-2">SELECIONE SEU NOME:</label>
                <select id="driver-select" class="w-full bg-slate-100 border border-slate-300 text-slate-800 font-bold p-3 rounded-lg outline-none focus:border-blue-500">
                    <option value="">Carregando motoristas...</option>
                </select>
            </div>
            
            <button onclick="App.login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg btn-press flex justify-center items-center gap-2">
                ACESSAR MINHA ROTA <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full">
        <header class="bg-blue-600 text-white p-4 shadow-md shrink-0 flex justify-between items-center z-10">
            <div>
                <div class="text-[10px] font-bold text-blue-200 uppercase tracking-wider mb-0.5" id="date-display">Rota de Hoje</div>
                <div class="font-black text-xl flex items-center gap-2">
                    <i class="fas fa-user-circle"></i> <span id="header-driver-name">NOME</span>
                </div>
            </div>
            <button onclick="App.logout()" class="w-10 h-10 rounded-full bg-blue-700 hover:bg-blue-800 flex items-center justify-center btn-press">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </header>

        <div class="bg-white px-4 py-3 shadow-sm border-b border-slate-200 shrink-0">
            <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase">Progresso do Dia</span>
                <span id="progress-text" class="text-sm font-black text-blue-600">0/0</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="trips-container" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-4 pb-24">
            <div class="text-center text-slate-400 mt-10 font-bold animate-pulse">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Buscando sua rota...
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUwkGHLnSQBIiDhZN6MfF-R-RhZQx-kg4",
            authDomain: "sgc-logistica-eaa73.firebaseapp.com",
            databaseURL: "https://sgc-logistica-eaa73-default-rtdb.firebaseio.com",
            projectId: "sgc-logistica-eaa73",
            storageBucket: "sgc-logistica-eaa73.firebasestorage.app",
            messagingSenderId: "1028470597897",
            appId: "1:1028470597897:web:43406a082f45bf1e41cbd8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const App = {
            myName: localStorage.getItem('sgc_driver_name'),
            trips: [],

            init() {
                document.getElementById('date-display').innerText = new Date().toLocaleDateString('pt-BR');
                
                // Se já estiver "logado", vai direto pra rota
                if (this.myName) {
                    this.showApp();
                    this.listenToMyRoute();
                } else {
                    this.loadDriversList();
                }
            },

            loadDriversList() {
                db.ref('sgc_data/fleet').once('value', snapshot => {
                    const select = document.getElementById('driver-select');
                    select.innerHTML = '<option value="">-- Escolha seu nome --</option>';
                    const fleet = snapshot.val();
                    
                    if (fleet) {
                        const nomes = Object.keys(fleet).sort();
                        nomes.forEach(nome => {
                            select.innerHTML += `<option value="${nome}">${nome}</option>`;
                        });
                    } else {
                        select.innerHTML = '<option value="">Nenhuma rota criada hoje</option>';
                    }
                });
            },

            login() {
                const select = document.getElementById('driver-select');
                const name = select.value;
                if (!name) return alert('Por favor, selecione seu nome na lista!');
                
                this.myName = name;
                localStorage.setItem('sgc_driver_name', name);
                this.showApp();
                this.listenToMyRoute();
            },

            logout() {
                if(confirm("Tem certeza que deseja sair?")) {
                    localStorage.removeItem('sgc_driver_name');
                    location.reload();
                }
            },

            showApp() {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('flex');
                document.getElementById('header-driver-name').innerText = this.myName;
            },

            listenToMyRoute() {
                const path = `sgc_data/fleet/${this.myName}/trips`;
                db.ref(path).on('value', snapshot => {
                    const data = snapshot.val();
                    if (data) {
                        // Converte objeto do firebase para array e renderiza
                        this.trips = Array.isArray(data) ? data : Object.values(data);
                        this.renderTrips();
                    } else {
                        this.trips = [];
                        document.getElementById('trips-container').innerHTML = `
                            <div class="text-center text-slate-400 mt-20">
                                <i class="fas fa-mug-hot text-5xl mb-4 opacity-50"></i>
                                <h3 class="text-lg font-black">Nenhuma rota pra você ainda!</h3>
                                <p class="text-xs">Fique tranquilo, a logística logo envia.</p>
                            </div>
                        `;
                        this.updateProgress();
                    }
                });
            },

            getLabel(type, qty) {
                const q = parseInt(qty) || 1;
                const t = (type || 'troca').toLowerCase();
                if (t.includes('troca')) return q > 1 ? 'TROCAS' : 'TROCA';
                if (t.includes('coloca')) return q > 1 ? 'COLOCAÇÕES' : 'COLOCAÇÃO';
                if (t.includes('retira')) return q > 1 ? 'RETIRADAS' : 'RETIRADA';
                if (t.includes('encher')) return 'ENCHER NA HORA';
                return type.toUpperCase();
            },

            toggleService(index, currentStatus) {
                const path = `sgc_data/fleet/${this.myName}/trips/${index}`;
                
                // Se está pendente (ou undefined), marca como concluido. Se já tá concluido, volta pra pendente.
                const isPendente = (currentStatus === 'pendente' || !currentStatus);
                
                const novoStatus = isPendente ? 'concluido' : 'pendente';
                const completed = isPendente ? true : false;
                
                let hora = null;
                if (isPendente) {
                    hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                }

                // Atualiza SÓ esse serviço no Firebase (não mexe nos outros)
                db.ref(path).update({
                    status: novoStatus,
                    completed: completed,
                    horaConclusao: hora
                });
            },

            updateProgress() {
                const total = this.trips.length;
                const concluidos = this.trips.filter(t => t.status === 'concluido' || t.completed).length;
                
                document.getElementById('progress-text').innerText = `${concluidos} de ${total}`;
                
                let perc = 0;
                if (total > 0) perc = (concluidos / total) * 100;
                document.getElementById('progress-bar').style.width = `${perc}%`;
                
                if(perc === 100 && total > 0) {
                    document.getElementById('progress-bar').classList.remove('bg-blue-600');
                    document.getElementById('progress-bar').classList.add('bg-green-500');
                } else {
                    document.getElementById('progress-bar').classList.add('bg-blue-600');
                    document.getElementById('progress-bar').classList.remove('bg-green-500');
                }
            },

            renderTrips() {
                const container = document.getElementById('trips-container');
                container.innerHTML = '';
                
                this.updateProgress();

                this.trips.forEach((t, index) => {
                    // Ignora serviços cancelados pela logística
                    if(t.status === 'cancelado') return;

                    const isDone = (t.status === 'concluido' || t.completed);
                    const qty = t.qty || 1;
                    const label = this.getLabel(t.type, qty);
                    
                    const end = (t.to && t.to.text) ? t.to.text.replace(/, Brasil$/i, '') : 'Endereço não informado';

                    // Tags Adicionais
                    const obsHtml = t.obs ? `<div class="bg-amber-100 text-amber-900 text-xs font-bold p-2 rounded mb-2 border border-amber-200"><i class="fas fa-exclamation-triangle mr-1"></i> OBS: ${t.obs}</div>` : '';
                    const mtrHtml = t.mtr ? `<div class="bg-indigo-100 text-indigo-900 text-[10px] font-bold p-1.5 rounded mb-2 w-fit border border-indigo-200"><i class="fas fa-file-invoice mr-1"></i> ${t.mtr}</div>` : '';
                    const descarteHtml = t.descarteLocal ? `<div class="bg-red-100 text-red-900 text-xs font-black p-2 rounded mb-2 border border-red-300 flex items-center gap-2"><i class="fas fa-recycle text-lg"></i> <span>DESCARTAR EM:<br>${t.descarteLocal}</span></div>` : '';

                    // Visual dependendo se está concluído ou não
                    const cardClass = isDone ? 'bg-green-50 border-green-300 opacity-90' : 'bg-white border-slate-200 shadow-md';
                    
                    const btnClass = isDone 
                        ? 'bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold border border-slate-300' 
                        : 'bg-green-600 hover:bg-green-700 text-white font-black shadow-lg';
                        
                    const btnText = isDone 
                        ? `<i class="fas fa-undo"></i> DESFAZER (Feito às ${t.horaConclusao || 'agora'})` 
                        : `<i class="fas fa-check-circle text-lg"></i> CONCLUIR SERVIÇO`;

                    const html = `
                    <div class="rounded-2xl border p-4 ${cardClass} transition-all">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <span class="bg-slate-800 text-white text-[10px] font-black px-2 py-1 rounded tracking-widest">${qty} ${label}</span>
                            </div>
                            ${isDone ? '<span class="text-green-600 font-black flex items-center gap-1"><i class="fas fa-check-double"></i> PRONTO</span>' : ''}
                        </div>
                        
                        <h2 class="text-lg font-black leading-tight text-slate-800 mb-1">${t.obra || 'Sem nome de Obra'}</h2>
                        <h3 class="text-sm font-bold text-slate-500 uppercase mb-3">${t.empresa || ''}</h3>
                        
                        <div class="flex items-start gap-2 text-sm font-semibold text-slate-700 bg-slate-100/50 p-2 rounded mb-3">
                            <i class="fas fa-map-marker-alt text-red-500 mt-1"></i>
                            <span>${end}</span>
                        </div>

                        ${obsHtml}
                        ${descarteHtml}
                        ${mtrHtml}

                        <button onclick="App.toggleService(${index}, '${t.status}')" class="w-full py-4 mt-2 rounded-xl text-sm btn-press flex items-center justify-center gap-2 transition-colors ${btnClass}">
                            ${btnText}
                        </button>
                    </div>`;

                    container.innerHTML += html;
                });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
