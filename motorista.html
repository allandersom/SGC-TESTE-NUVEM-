<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="images.png">
    <meta name="theme-color" content="#2563eb">
    <title>Motorista - SGC Logística</title>
    <link rel="icon" type="image/png" href="images.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .btn-press:active { transform: scale(0.96); }
    </style>
</head>
<body class="text-slate-800 antialiased h-screen flex flex-col overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center p-6 transition-all duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-4xl mx-auto mb-4">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="text-2xl font-black mb-2 text-slate-800">SGC Acesso</h1>
            <p class="text-xs text-slate-500 mb-6 font-semibold uppercase">Identifique-se para ver sua rota</p>
            
            <div class="text-left mb-4">
                <label class="text-xs font-bold text-slate-700 block mb-2">MOTORISTA:</label>
                <select id="driver-select" class="w-full bg-slate-100 border border-slate-300 text-slate-800 font-bold p-3 rounded-lg outline-none focus:border-blue-500">
                    <option value="">Carregando motoristas...</option>
                </select>
            </div>

            <div class="text-left mb-6">
                <label class="text-xs font-bold text-slate-700 block mb-2">SENHA DE ACESSO:</label>
                <input type="password" id="driver-password" placeholder="Digite a senha" class="w-full bg-slate-100 border border-slate-300 text-slate-800 font-bold p-3 rounded-lg outline-none focus:border-blue-500 text-center tracking-widest">
            </div>
            
            <button onclick="App.login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl shadow-lg btn-press flex justify-center items-center gap-2">
                ENTRAR <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <div id="app-screen" class="hidden flex-col h-full relative">
        <header class="bg-blue-600 text-white p-4 shadow-md shrink-0 flex justify-between items-center z-10">
            <div class="flex-1 mr-4">
                <input type="date" id="driver-date" onchange="App.changeDate(this.value)" class="text-[10px] font-bold text-blue-800 bg-blue-200 rounded px-2 py-1 uppercase tracking-wider mb-0.5 outline-none border-none shadow-inner w-full max-w-[150px] cursor-pointer">
                <div class="font-black text-xl flex items-center gap-2 mt-1">
                    <i class="fas fa-user-circle"></i> <span id="header-driver-name" class="truncate">NOME</span>
                </div>
            </div>
            <button onclick="App.logout()" class="w-10 h-10 rounded-full bg-blue-700 hover:bg-blue-800 flex items-center justify-center btn-press shadow-inner shrink-0">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </header>

        <div class="bg-white px-4 py-3 shadow-sm border-b border-slate-200 shrink-0">
            <div class="flex justify-between items-end mb-2">
                <span class="text-xs font-bold text-slate-500 uppercase">Progresso do Dia</span>
                <span id="progress-text" class="text-sm font-black text-blue-600">0/0</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div id="trips-container" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-4 pb-24">
            <div class="text-center text-slate-400 mt-10 font-bold animate-pulse">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i><br>Buscando sua rota...
            </div>
        </div>

        <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" onchange="App.processPhoto(event)">
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCUwkGHLnSQBIiDhZN6MfF-R-RhZQx-kg4",
            authDomain: "sgc-logistica-eaa73.firebaseapp.com",
            databaseURL: "https://sgc-logistica-eaa73-default-rtdb.firebaseio.com",
            projectId: "sgc-logistica-eaa73",
            storageBucket: "sgc-logistica-eaa73.firebasestorage.app",
            messagingSenderId: "1028470597897",
            appId: "1:1028470597897:web:43406a082f45bf1e41cbd8"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

       const App = {
            myName: localStorage.getItem('sgc_driver_name'),
            currentDate: '',
            trips: [],
            currentPhotoIndex: null,

            // 🔥 NOVA FUNÇÃO: Pega a data exata de hoje no formato do calendário
            getTodayDate() {
                const d = new Date();
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            },

            init() {
                // Usa a nova função para definir o dia de hoje
                this.currentDate = this.getTodayDate();
                
                const dateInput = document.getElementById('driver-date');
                if(dateInput) {
                    dateInput.value = this.currentDate;
                    // 🔥 BLOQUEIO VISUAL: Impede o calendário de voltar no tempo
                    dateInput.min = this.currentDate; 
                }
                
                if (this.myName) {
                    this.showApp();
                    this.listenToMyRoute();
                } else {
                    this.loadDriversList();
                }
            },

            changeDate(val) {
                if(!val) return;
                
                const today = this.getTodayDate();
                
                // 🔥 TRAVA DE SEGURANÇA: Se ele tentar dar um "jeitinho" de voltar a data
                if (val < today) {
                    alert("Acesso bloqueado: Você não pode visualizar ou alterar rotas de dias que já passaram.");
                    // Devolve o calendário para a data que ele estava antes de tentar burlar
                    document.getElementById('driver-date').value = this.currentDate; 
                    return;
                }

                this.currentDate = val;
                this.listenToMyRoute();
            },

            // ... (O RESTO DO SEU CÓDIGO CONTINUA IGUAL A PARTIR DAQUI: loadDriversList, login, etc) ...

            changeDate(val) {
                if(!val) return;
                this.currentDate = val;
                this.listenToMyRoute();
            },

            loadDriversList() {
                db.ref('sgc_data/routes/' + this.currentDate + '/fleet').once('value', snapshot => {
                    const select = document.getElementById('driver-select');
                    select.innerHTML = '<option value="">-- Escolha seu nome --</option>';
                    const fleet = snapshot.val();
                    
                    if (fleet) {
                        const nomes = Object.keys(fleet).sort();
                        nomes.forEach(nome => {
                            select.innerHTML += `<option value="${nome}">${nome}</option>`;
                        });
                    } else {
                        select.innerHTML = '<option value="">Nenhuma rota para esta data</option>';
                    }
                });
            },

            login() {
                const select = document.getElementById('driver-select');
                const passInput = document.getElementById('driver-password');
                const name = select.value;
                const password = passInput ? passInput.value : '';

                if (!name) return alert('Por favor, selecione seu nome na lista!');
                
                if (password !== '12345') {
                    alert('Senha incorreta!');
                    if(passInput) passInput.value = ''; 
                    return;
                }
                
                this.myName = name;
                localStorage.setItem('sgc_driver_name', name);
                this.showApp();
                this.listenToMyRoute();
            },

            logout() {
                if(confirm("Tem certeza que deseja sair?")) {
                    localStorage.removeItem('sgc_driver_name');
                    location.reload();
                }
            },

            // ... código anterior do App ...

            showApp() {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('flex');
                document.getElementById('header-driver-name').innerText = this.myName;

                // Avisa se a internet cair ou voltar
                window.addEventListener('offline', () => this.showOfflineWarning(true));
                window.addEventListener('online', () => this.showOfflineWarning(false));
                
                if (!navigator.onLine) this.showOfflineWarning(true);
            },

            showOfflineWarning(isOffline) {
                const header = document.querySelector('header');
                if (isOffline) {
                    header.classList.replace('bg-blue-600', 'bg-slate-800');
                    document.getElementById('header-driver-name').innerHTML = `${this.myName} <span class="text-[9px] bg-red-500 text-white px-2 py-0.5 rounded ml-2 animate-pulse">OFFLINE</span>`;
                } else {
                    header.classList.replace('bg-slate-800', 'bg-blue-600');
                    document.getElementById('header-driver-name').innerText = this.myName;
                }
            },

            listenToMyRoute() {
                const path = `sgc_data/routes/${this.currentDate}/fleet/${this.myName}/trips`;
                
                // Escuta o Firebase. Se tiver net, ele atualiza e salva no celular.
                db.ref(path).on('value', snapshot => {
                    const data = snapshot.val();
                    if (data) {
                        this.trips = Array.isArray(data) ? data : Object.values(data);
                        
                        // 🔥 A MÁGICA DO OFFLINE: Salva as rotas no celular do motorista
                        localStorage.setItem(`sgc_rotas_${this.currentDate}`, JSON.stringify(this.trips));
                        
                        this.renderTrips();
                    } else {
                        this.trips = [];
                        this.renderEmpty();
                    }
                });

                // Se abrir o app já sem internet, tenta puxar o que salvou antes
                if (!navigator.onLine) {
                    const rotasSalvas = localStorage.getItem(`sgc_rotas_${this.currentDate}`);
                    if (rotasSalvas) {
                        this.trips = JSON.parse(rotasSalvas);
                        this.renderTrips();
                    } else {
                        this.renderEmpty();
                    }
                }
            },

            renderEmpty() {
                document.getElementById('trips-container').innerHTML = `
                    <div class="text-center text-slate-400 mt-20">
                        <i class="fas fa-mug-hot text-5xl mb-4 opacity-50"></i>
                        <h3 class="text-lg font-black">Nenhuma rota pra você!</h3>
                        <p class="text-xs mt-2">Escolha outra data acima se necessário.</p>
                    </div>
                `;
                this.updateProgress();
            },

            // ... continua com a função getLabel(type, qty) do seu código ...

            getLabel(type, qty) {
                const q = parseInt(qty) || 1;
                const t = (type || 'troca').toLowerCase();
                if (t.includes('troca')) return q > 1 ? 'TROCAS' : 'TROCA';
                if (t.includes('coloca')) return q > 1 ? 'COLOCAÇÕES' : 'COLOCAÇÃO';
                if (t.includes('retira')) return q > 1 ? 'RETIRADAS' : 'RETIRADA';
                if (t.includes('encher')) return 'ENCHER NA HORA';
                return type.toUpperCase();
            },

            markService(index, novoStatus) {
                // Ao clicar em não feito ou concluido, a gente trava.
                if(!confirm(`Confirma marcar como ${novoStatus === 'concluido' ? 'FEITO' : 'NÃO FEITO'}? (Não poderá ser desfeito)`)) return;

                const path = `sgc_data/routes/${this.currentDate}/fleet/${this.myName}/trips/${index}`;
                const trip = this.trips[index];
                
                const obsInput = document.getElementById(`obs-driver-${index}`);
                const driverObs = obsInput ? obsInput.value.trim() : '';
                
                let finalObs = trip.obs || '';
                if (driverObs) {
                    finalObs = finalObs.replace(/\|? ?MOT:.*$/g, '').trim();
                    finalObs = finalObs ? `${finalObs} | MOT: ${driverObs}` : `MOT: ${driverObs}`;
                }

                let hora = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                db.ref(path).update({
                    status: novoStatus,
                    completed: novoStatus === 'concluido',
                    horaConclusao: hora,
                    obs: finalObs
                });
            },

            removeDriverObs(index) {
                if(confirm("Apagar sua observação?")) {
                    const path = `sgc_data/routes/${this.currentDate}/fleet/${this.myName}/trips/${index}`;
                    let finalObs = this.trips[index].obs || '';
                    finalObs = finalObs.replace(/\|? ?MOT:.*$/g, '').trim();
                    db.ref(path).update({ obs: finalObs });
                }
            },

            // LÓGICA DA CÂMERA (Comprime para o Firebase não estourar limite)
            takePhoto(index) {
                this.currentPhotoIndex = index;
                document.getElementById('camera-input').click();
            },

            processPhoto(e) {
                const file = e.target.files[0];
                if(!file) return;
                
                // Mostrar alerta que está enviando
                alert("Processando foto, aguarde...");

                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // Reduz o tamanho da foto para não pesar no banco
                        const MAX_WIDTH = 600; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        // Converte para JPG 60% qualidade
                        const base64 = canvas.toDataURL('image/jpeg', 0.6); 

                        // Salva no banco
                        const path = `sgc_data/routes/${this.currentDate}/fleet/${this.myName}/trips/${this.currentPhotoIndex}`;
                        db.ref(path).update({ foto: base64 });
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            },

            updateProgress() {
                // Não conta as canceladas pela logística no total do motorista
                const rotasAtivas = this.trips.filter(t => t.status !== 'cancelado');
                const total = rotasAtivas.length;
                const resolvidos = rotasAtivas.filter(t => t.status === 'concluido' || t.completed || t.status === 'nao_feito').length;
                
                document.getElementById('progress-text').innerText = `${resolvidos} de ${total}`;
                let perc = total > 0 ? (resolvidos / total) * 100 : 0;
                document.getElementById('progress-bar').style.width = `${perc}%`;
                
                if(perc === 100 && total > 0) {
                    document.getElementById('progress-bar').classList.replace('bg-blue-600', 'bg-green-500');
                } else {
                    document.getElementById('progress-bar').classList.replace('bg-green-500', 'bg-blue-600');
                }
            },

            renderTrips() {
                const container = document.getElementById('trips-container');
                container.innerHTML = '';
                this.updateProgress();

                this.trips.forEach((t, index) => {
                    // SOME DA TELA SE A LOGÍSTICA CANCELAR (BOTÃO X LARANJA)
                    if(t.status === 'cancelado') return;

                    const isDone = (t.status === 'concluido' || t.completed);
                    const isFailed = (t.status === 'nao_feito');
                    // Se foi feito ou falhou, está travado.
                    const isLocked = isDone || isFailed;

                    const qty = t.qty || 1;
                    const label = this.getLabel(t.type, qty);
                    const end = (t.to && t.to.text) ? t.to.text.replace(/, Brasil$/i, '') : 'Endereço não informado';
                    
                    const mapLink = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(end);
                    
                    let obsHtml = '';
                    if (t.obs) {
                        const parts = t.obs.split(/\|? ?MOT: /);
                        const logObs = parts[0].trim();
                        const motObs = parts[1] ? parts[1].trim() : '';

                        if (logObs) obsHtml += `<div class="bg-amber-100 text-amber-900 text-xs font-bold p-2 rounded mb-2 border border-amber-200 shadow-sm"><i class="fas fa-exclamation-triangle mr-1"></i> LOGÍSTICA: ${logObs}</div>`;
                        if (motObs) obsHtml += `
                            <div class="bg-blue-50 text-blue-800 text-xs font-bold p-2 rounded mb-2 border border-blue-200 flex justify-between items-center shadow-sm">
                                <div><i class="fas fa-comment-dots mr-1"></i> MINHA OBS: ${motObs}</div>
                                ${!isLocked ? `<button onclick="App.removeDriverObs(${index})" class="text-blue-400 hover:text-red-500 p-2 btn-press"><i class="fas fa-trash"></i></button>` : ''}
                            </div>`;
                    }

                    const mtrHtml = t.mtr ? `<div class="bg-indigo-100 text-indigo-900 text-[10px] font-bold p-1.5 rounded mb-2 w-fit border border-indigo-200 shadow-sm"><i class="fas fa-file-invoice mr-1"></i> ${t.mtr}</div>` : '';
                    const descarteHtml = t.descarteLocal ? `<div class="bg-red-100 text-red-900 text-xs font-black p-2 rounded mb-2 border border-red-300 flex items-center gap-2 shadow-sm"><i class="fas fa-recycle text-lg"></i> <span>DESCARTAR EM:<br>${t.descarteLocal}</span></div>` : '';

                    // Badge de Foto enviada
                    const fotoEnviadaHtml = t.foto ? `<div class="mt-2 bg-slate-800 text-white text-xs font-bold p-2 rounded-xl text-center"><i class="fas fa-image text-green-400"></i> FOTO ENVIADA COMO COMPROVANTE</div>` : '';

                    let cardClass = 'bg-white border-slate-200 shadow-md';
                    if (isDone) cardClass = 'bg-green-50 border-green-300 opacity-95';
                    if (isFailed) cardClass = 'bg-red-50 border-red-300 opacity-95';

                    let statusBadge = '';
                    if (isDone) statusBadge = '<span class="text-green-600 font-black flex items-center gap-1"><i class="fas fa-check-double"></i> FEITO</span>';
                    if (isFailed) statusBadge = '<span class="text-red-600 font-black flex items-center gap-1"><i class="fas fa-times-circle"></i> NÃO FEITO</span>';

                    let botoesAcao = '';
                    if (!isLocked) {
                        // AINDA PENDENTE: Mostra botão de câmera, botão de texto e botão de salvar
                        botoesAcao = `
                            <div class="mt-4 pt-4 border-t border-slate-200">
                                
                                ${t.foto ? fotoEnviadaHtml : `
                                <button onclick="App.takePhoto(${index})" class="w-full mb-3 bg-slate-200 hover:bg-slate-300 text-slate-700 font-black py-3 rounded-xl shadow-sm btn-press flex items-center justify-center gap-2 border border-slate-300">
                                    <i class="fas fa-camera text-lg text-slate-600"></i> ADICIONAR FOTO
                                </button>
                                `}

                                <input type="text" id="obs-driver-${index}" placeholder="Alguma observação? (Opcional)" class="w-full p-3 border border-slate-300 rounded-xl text-sm bg-slate-50 mb-3 outline-none focus:border-blue-500 shadow-inner">
                                
                                <div class="flex gap-2">
                                    <button onclick="App.markService(${index}, 'nao_feito')" class="flex-1 bg-red-500 hover:bg-red-600 text-white font-black py-3 rounded-xl shadow-md btn-press flex items-center justify-center gap-1">
                                        <i class="fas fa-times"></i> NÃO
                                    </button>
                                    <button onclick="App.markService(${index}, 'concluido')" class="flex-[2] bg-green-600 hover:bg-green-700 text-white font-black py-3 rounded-xl shadow-md btn-press flex items-center justify-center gap-1">
                                        <i class="fas fa-check"></i> CONCLUIR
                                    </button>
                                </div>
                            </div>
                        `;
                    } else {
                        // TÁ TRAVADO. Não tem mais botão desfazer.
                        botoesAcao = `
                            <div class="mt-3 p-3 bg-slate-800 text-white font-black rounded-xl text-center shadow-inner uppercase tracking-wider text-xs">
                                <i class="fas fa-lock text-slate-400 mr-1"></i> SERVIÇO TRAVADO (Feito às ${t.horaConclusao})
                            </div>
                            ${fotoEnviadaHtml}
                        `;
                    }

                    const html = `
                    <div class="rounded-2xl border p-4 ${cardClass} transition-all">
                        <div class="flex justify-between items-start mb-3">
                            <div><span class="bg-slate-800 text-white text-[10px] font-black px-2 py-1 rounded tracking-widest">${qty} ${label}</span></div>
                            ${statusBadge}
                        </div>
                        
                        <h2 class="text-lg font-black leading-tight text-slate-800 mb-1">${t.obra || 'Sem nome de Obra'}</h2>
                        <h3 class="text-sm font-bold text-slate-500 uppercase mb-3">${t.empresa || ''}</h3>
                        
                        <div class="flex justify-between items-center bg-slate-100/50 p-2 rounded mb-3 border border-slate-200">
                            <div class="flex items-start gap-2 text-xs font-semibold text-slate-700 pr-2">
                                <i class="fas fa-map-marker-alt text-red-500 mt-0.5"></i>
                                <span>${end}</span>
                            </div>
                            <a href="${mapLink}" target="_blank" class="bg-blue-100 text-blue-700 px-3 py-2 rounded-lg text-[10px] font-black flex flex-col items-center justify-center hover:bg-blue-200 shrink-0 shadow-sm btn-press border border-blue-200">
                                <i class="fas fa-location-arrow text-sm mb-0.5"></i> MAPS
                            </a>
                        </div>

                        ${obsHtml}
                        ${descarteHtml}
                        ${mtrHtml}
                        ${botoesAcao}
                    </div>`;
                    container.innerHTML += html;
                });
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
